app = "cuatro"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

  # Public-by-design client keys (anon key, not service-role) — safe to
  # commit. Passed through as Docker build args because NEXT_PUBLIC_* vars
  # are inlined into the bundle at `next build` time, not read at runtime
  # (see Dockerfile's builder stage and [env] below, which covers runtime).
  [build.args]
    NEXT_PUBLIC_SUPABASE_URL = "https://lkdnxrfddlodmjakhikw.supabase.co"
    NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZG54cmZkZGxvZG1qYWtoaWt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTkwODYsImV4cCI6MjA5OTI3NTA4Nn0.h0Vkqh5vYWkARZomaebcFCvseEoryOGID2yqN6yg60s"
    # THE ATLAS map tiles: self-hosted Protomaps PMTiles (GB+NI z14) on a Fly
    # Tigris bucket, read by the browser via HTTP Range. Public basemap, no key.
    NEXT_PUBLIC_TILES_URL = "pmtiles://https://cuatro-tiles.fly.storage.tigris.dev/cuatro-uk-z14-2026-07.pmtiles"

[env]
  # AVATAR_DIR stays on the /data volume (avatars are the only thing left on
  # it). DATABASE_URL is NOT here — it is the Supabase Postgres connection
  # string, set as a Fly secret (`fly secrets set DATABASE_URL=...`), never
  # baked into config.
  AVATAR_DIR = "/data/avatars"
  PORT = "3000"
  # Dedicated cuatro Supabase project (prod). Local dev always points at the
  # local Docker stack instead, for dev/prod parity — see apps/web/.env.local
  # and .env.example.
  NEXT_PUBLIC_SUPABASE_URL = "https://lkdnxrfddlodmjakhikw.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZG54cmZkZGxvZG1qYWtoaWt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTkwODYsImV4cCI6MjA5OTI3NTA4Nn0.h0Vkqh5vYWkARZomaebcFCvseEoryOGID2yqN6yg60s"
  # Server-side product analytics for the §9 pilot metrics (pilot/METRICS.md).
  # POSTHOG_KEY is a PUBLIC project write key (safe to commit); no key ⇒ no-op.
  POSTHOG_KEY = "phc_CsaZuVaiRo6W5fqhUcBYYRyFdXuZ6z5KDc2ioRhu4ty9"
  POSTHOG_HOST = "https://us.i.posthog.com"

[[mounts]]
  source = "cuatro_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
