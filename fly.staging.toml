# STAGING — Fly app `cuatro-staging` (https://cuatro-staging.fly.dev)
# Deploy: fly deploy -c fly.staging.toml --ha=false   (from repo root, any branch)
# Fully isolated from prod: own Supabase project (auth + realtime + its own
# Postgres, reached via the DATABASE_URL secret). The /data volume holds only
# avatars now. Machine autostops when idle; first request after sleep takes a
# few seconds — that is fine for staging.
app = "cuatro-staging"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

  # Public-by-design client keys (anon key, not service-role) — safe to
  # commit. Inlined at `next build` time; [env] below covers runtime.
  [build.args]
    NEXT_PUBLIC_SUPABASE_URL = "https://cmqicxumhmthbuoehoju.supabase.co"
    NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWljeHVtaG10aGJ1b2Vob2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTkxMDksImV4cCI6MjA5OTI3NTEwOX0.nJUasMQtYA4QzP10Q3lCAjNVAQcpUMZT6gJOuhela0E"
    NEXT_PUBLIC_APP_ENV = "staging"

[env]
  # AVATAR_DIR stays on the /data volume (avatars only). DATABASE_URL is a Fly
  # secret (`fly secrets set -a cuatro-staging DATABASE_URL=...`), not baked.
  AVATAR_DIR = "/data/avatars"
  PORT = "3000"
  NEXT_PUBLIC_SUPABASE_URL = "https://cmqicxumhmthbuoehoju.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWljeHVtaG10aGJ1b2Vob2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTkxMDksImV4cCI6MjA5OTI3NTEwOX0.nJUasMQtYA4QzP10Q3lCAjNVAQcpUMZT6gJOuhela0E"
  NEXT_PUBLIC_APP_ENV = "staging"

[[mounts]]
  source = "cuatro_staging_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
