# STAGING — Fly app `cuatro-staging` (https://cuatro-staging.fly.dev)
# Deploy: fly deploy -c fly.staging.toml --ha=false   (from repo root, any branch)
# Fully isolated from prod: own volume/SQLite, own Supabase project
# (edususarvcwppascgnmf, auth+realtime only). Machine autostops when idle;
# first request after sleep takes a few seconds — that is fine for staging.
app = "cuatro-staging"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

  # Public-by-design client keys (anon key, not service-role) — safe to
  # commit. Inlined at `next build` time; [env] below covers runtime.
  [build.args]
    NEXT_PUBLIC_SUPABASE_URL = "https://edususarvcwppascgnmf.supabase.co"
    NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdXN1c2FydmN3cHBhc2Nnbm1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTY3NDQsImV4cCI6MjA5OTI3Mjc0NH0.EyUVwrngCi6DjHNufeEIpn5rU5SvnCV_j-_e3FaYGUE"
    NEXT_PUBLIC_APP_ENV = "staging"

[env]
  AVATAR_DIR = "/data/avatars"
  PORT = "3000"
  DATABASE_PATH = "/data/cuatro.db"
  NEXT_PUBLIC_SUPABASE_URL = "https://edususarvcwppascgnmf.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdXN1c2FydmN3cHBhc2Nnbm1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTY3NDQsImV4cCI6MjA5OTI3Mjc0NH0.EyUVwrngCi6DjHNufeEIpn5rU5SvnCV_j-_e3FaYGUE"
  NEXT_PUBLIC_APP_ENV = "staging"

[[mounts]]
  source = "cuatro_staging_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
