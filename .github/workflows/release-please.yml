name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Merging the release PR cuts a release AND ships it to staging for
  # validation. Prod stays a manual `fly deploy --ha=false` after the gate
  # (see CLAUDE.md) — the token below is deploy-scoped to cuatro-staging
  # only, so this workflow physically cannot touch prod.
  deploy-staging:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ${{ needs.release-please.outputs.tag_name }} to staging
        run: flyctl deploy -c fly.staging.toml --ha=false --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_STAGING_DEPLOY_TOKEN }}
