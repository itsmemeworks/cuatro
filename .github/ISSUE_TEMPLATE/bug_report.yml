name: Bug report
description: Something in CUATRO is not working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. CUATRO runs in your phone's
        browser, so knowing which phone and which browser helps us see what
        you saw.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe what you saw, in your own words.
      placeholder: I tapped "I'm in" on tonight's game and nothing happened.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What should have happened instead?
      placeholder: My name should have joined the four.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      description: Phone or computer, and the model if you know it.
      placeholder: iPhone 14, or a Windows laptop
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser, and whether you added CUATRO to your home screen.
      placeholder: Safari (added to home screen), or Chrome
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: How to make it happen again
      description: The steps you took, as best you remember them.
      placeholder: |
        1. Opened my circle
        2. Tapped tonight's game
        3. Tapped "I'm in"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: A screenshot helps a lot. Drag one in here if you have it.
    validations:
      required: false
